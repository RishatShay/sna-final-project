apiVersion: 1

groups:
  - orgId: 1
    name: raft-health
    folder: Raft
    interval: 30s
    rules:
      - uid: raft_node_down
        title: Raft node down
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: up{job="raft"} == 0
              instant: true
              refId: A
        noDataState: OK
        execErrState: Error
        for: 2m

      - uid: raft_no_leader
        title: Raft cluster has no leader
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: sum(raft_is_leader) != 1
              instant: true
              refId: A
        noDataState: OK
        execErrState: Error
        for: 2m
      - uid: raft_2_nodes_down
        title: "Raft: 2 nodes down"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: count(up{job="raft"} == 0) >= 2
              instant: true
              refId: A
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: "Raft nodes are unreachable"
          description: "Quorum is at risk. Immediate attention required."

      - uid: raft_3_nodes_down
        title: "Raft: 3 nodes down (QUORUM LOST)"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: count(up{job="raft"} == 0) >= 3
              instant: true
              refId: A
        noDataState: OK
        execErrState: Error
        for: 30s
        annotations:
          summary: "QUORUM LOST! 3+ nodes down"
          description: "Cluster cannot commit writes. Full failover in progress."

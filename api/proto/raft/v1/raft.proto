syntax = "proto3";

package raft.v1;

option go_package = "github.com/example/sna-project/internal/wire;wire";

message LogEntry {
  uint64 index = 1;
  uint64 term = 2;
  bytes command = 3;
}

message RequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 match_index = 3;
}

message InstallSnapshotRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes data = 5;
}

message InstallSnapshotResponse {
  uint64 term = 1;
}

message ClientWriteRequest {
  string key = 1;
  string value = 2;
}

message ClientWriteResponse {
  bool success = 1;
  string leader_id = 2;
  string error = 3;
  uint64 index = 4;
  uint64 term = 5;
}

message ClientReadRequest {
  string key = 1;
}

message ClientReadResponse {
  bool success = 1;
  string leader_id = 2;
  string error = 3;
  string value = 4;
}

message StatusRequest {}

message PeerStatus {
  string id = 1;
  string address = 2;
  uint64 match_index = 3;
  uint64 next_index = 4;
}

message StatusResponse {
  string id = 1;
  string role = 2;
  uint64 term = 3;
  string leader_id = 4;
  uint64 commit_index = 5;
  uint64 last_applied = 6;
  uint64 last_log_index = 7;
  repeated PeerStatus peers = 8;
}

service RaftService {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

service ClientService {
  rpc Write(ClientWriteRequest) returns (ClientWriteResponse);
  rpc Read(ClientReadRequest) returns (ClientReadResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
}

